{% extends 'base.html' %}
{% block content %}
<div class="auth-container">
	<div class="auth-card">
		<div class="auth-header">
			<div class="auth-logo">
				<i class="fas fa-graduation-cap"></i>
			</div>
			<h1 class="auth-title">Welcome Back</h1>
			<p class="auth-subtitle">Sign in to your student portal</p>
		</div>
		
		<form method="post" class="auth-form">
			<div class="form-floating">
				<input type="text" class="form-control" id="identifier" name="identifier" placeholder="Email or Roll Number" required>
				<label for="identifier">
					<i class="fas fa-user me-2"></i>Email or Roll Number
				</label>
			</div>
			
			<div class="form-floating">
				<input type="password" class="form-control" id="password" name="password" placeholder="Password" required>
				<label for="password">
					<i class="fas fa-lock me-2"></i>Password
				</label>
			</div>
			
			<button type="submit" class="auth-btn">
				<i class="fas fa-sign-in-alt me-2"></i>Sign In
			</button>
		</form>

		<div class="text-center mt-3">
			<button id="faceLoginBtn" class="btn btn-outline-secondary w-100">
				<i class="fas fa-user-lock me-2"></i>Login with Face
			</button>
		</div>


		
		<div class="auth-links">
			<p class="mb-0">Don't have an account? <a href="{{ url_for('auth.register') }}">Create one here</a></p>
		</div>
	</div>
</div>
<script>
async function captureEmbedding() {
	if (!navigator.mediaDevices?.getUserMedia) throw new Error('Camera not supported');
	const stream = await navigator.mediaDevices.getUserMedia({ video: true });
	const video = document.createElement('video');
	video.srcObject = stream; await video.play();
	const canvas = document.createElement('canvas');
	canvas.width = 160; canvas.height = 120; const ctx = canvas.getContext('2d');
	ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
	stream.getTracks().forEach(t=>t.stop());
	const img = ctx.getImageData(0,0,canvas.width,canvas.height).data;
	const emb = [];
	for (let i=0; i<img.length; i+=16) emb.push((img[i]+img[i+1]+img[i+2])/3/255);
	return emb.slice(0,512);
}

document.getElementById('faceLoginBtn')?.addEventListener('click', async ()=>{
	const identifier = document.getElementById('identifier').value;
	if (!identifier) { alert('Enter email or roll number first.'); return; }
	try {
		const embedding = await captureEmbedding();
		const res = await fetch('/face/login', { method: 'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ identifier, embedding }) });
		const data = await res.json();
		if (data.ok) { window.location = data.redirect || '/dashboard'; } else { alert(data.error||'Face login failed'); }
	} catch (e) { console.error(e); alert('Unable to access camera or process face.'); }
});
</script>
{% endblock %}
