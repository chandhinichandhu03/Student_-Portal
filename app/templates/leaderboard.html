{% extends 'base.html' %}
{% block content %}
<!-- Back Button -->
<div class="mb-3">
	<a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">
		<i class="fas fa-arrow-left me-2"></i>Back to Dashboard
	</a>
</div>

<h2 class="h4 mb-3">Leaderboard</h2>
<div class="card shadow-sm">
	<div class="card-body">
		<table class="table">
			<thead><tr><th>#</th><th>Student</th><th>Average %</th></tr></thead>
			<tbody>
			{% for item in items %}
			<tr><td>{{ loop.index }}</td><td>{{ item.user.name }}</td><td>{{ item.avg_pct }}</td></tr>
			{% else %}
			<tr><td colspan="3">No data</td></tr>
			{% endfor %}
			</tbody>
		</table>
	</div>
</div>
{% endblock %}
