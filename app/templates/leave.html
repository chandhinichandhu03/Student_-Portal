{% extends 'base.html' %}
{% block content %}
<!-- Back Button -->
<div class="mb-3">
	<a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">
		<i class="fas fa-arrow-left me-2"></i>Back to Dashboard
	</a>
</div>

<h2 class="h4 mb-3">Leave Application</h2>
<form method="post" class="card shadow-sm p-3 mb-3">
	<div class="row g-2">
		<div class="col-md-3"><label class="form-label">From</label><input type="date" class="form-control" name="from_date" required></div>
		<div class="col-md-3"><label class="form-label">To</label><input type="date" class="form-control" name="to_date" required></div>
		<div class="col-12"><label class="form-label">Reason</label><textarea class="form-control" name="reason" rows="3" required></textarea></div>
	</div>
	<button class="btn btn-primary mt-3">Submit</button>
</form>
<div class="card shadow-sm">
	<div class="card-body">
		<h5>My Requests</h5>
		<table class="table table-sm">
			<thead><tr><th>Dates</th><th>Status</th><th>Reason</th></tr></thead>
			<tbody>
			{% for a in apps %}
			<tr><td>{{ a.from_date }} → {{ a.to_date }}</td><td>{{ a.status }}</td><td>{{ a.reason }}</td></tr>
			{% else %}
			<tr><td colspan="3">No leave requests.</td></tr>
			{% endfor %}
			</tbody>
		</table>
	</div>
</div>
{% endblock %}
