{% extends 'base.html' %}
{% block content %}
<!-- Back Button -->
<div class="mb-3">
	<a href="{{ url_for('main.dashboard') }}" class="btn btn-outline-secondary">
		<i class="fas fa-arrow-left me-2"></i>Back to Dashboard
	</a>
</div>

<h2 class="h4 mb-3">Upload Test (CSV)</h2>
<form method="post" enctype="multipart/form-data" class="card shadow p-4">
	<div class="row g-3">
		<div class="col-md-5"><label class="form-label">Subject</label><input class="form-control" name="subject" required></div>
		<div class="col-md-5"><label class="form-label">Department</label><input class="form-control" name="department"></div>
		<div class="col-md-12"><label class="form-label">CSV File</label><input type="file" class="form-control" name="file" accept=".csv" required></div>
	</div>
	<button class="btn btn-primary mt-3">Upload</button>
	<p class="text-muted mt-2">CSV headers: subject,question,option1,option2,option3,option4,correct</p>
</form>
{% endblock %}
